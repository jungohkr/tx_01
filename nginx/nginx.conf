events {}

http {
    server {
        listen 80;

        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 로그 설정 추가
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
    }
}
